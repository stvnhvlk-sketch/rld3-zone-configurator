# Serves the configurator at the ingress root. The app lives at /ui/index.html
# and imports ../src/*, so /www holds ui/ and src/ as siblings plus a root
# index.html that meta-refreshes (relatively) into ui/. No server-issued
# Location redirects: an absolute "/ui/" header would drop the ingress token,
# so the redirect is done client-side with a relative URL instead.
server {
    listen 8099 default_server;
    listen [::]:8099 default_server;

    root /www;
    index index.html;

    # If we ever do emit a redirect, keep it host-relative (defensive).
    absolute_redirect off;

    location / {
        try_files $uri $uri/ =404;
    }
}
