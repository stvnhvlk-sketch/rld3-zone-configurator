<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RLD3-Target Zone Configurator</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; height: 100vh; display: flex; font: 13px/1.4 system-ui, sans-serif;
    background: #0e1116; color: #d7dde5;
  }
  #side {
    width: 280px; flex: 0 0 280px; padding: 12px; overflow-y: auto;
    background: #151a21; border-right: 1px solid #232b36;
  }
  #stage { flex: 1; position: relative; }
  canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
  h1 { font-size: 14px; margin: 0 0 10px; letter-spacing: .02em; }
  h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
       color: #8a97a8; margin: 16px 0 6px; }
  .row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; align-items: center; }
  button, select, input {
    background: #1d2530; color: #d7dde5; border: 1px solid #2c3744; border-radius: 6px;
    padding: 5px 8px; font: inherit;
  }
  button { cursor: pointer; }
  button:hover { background: #25303d; }
  button:disabled { opacity: 0.4; cursor: default; }
  button.on { background: #2563eb; border-color: #2563eb; color: #fff; }
  label { display: flex; align-items: center; gap: 6px; }
  input[type=number] { width: 80px; }
  #zones { display: flex; flex-direction: column; gap: 12px; }  /* gap = space between categories */
  .zone-cat { display: flex; flex-wrap: wrap; gap: 6px; }
  /* Fixed half-column (no grow) so every button is the same size — a lone button
     (Master, Exclude 3) stays half-width instead of stretching to fill the row. */
  .zone-cat button { flex: 0 1 calc(50% - 3px); text-align: left; padding: 5px 7px; }
  .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; }
  #status, #mqStatus { white-space: pre-wrap; font-family: ui-monospace, monospace; font-size: 12px;
            background: #11161d; border: 1px solid #232b36; border-radius: 6px; padding: 8px;
            min-height: 48px; }
  /* Separates the Device (connection) group from the Edit (layout) group below. */
  .group-sep { border: none; border-top: 1px solid #2c3744; margin: 16px 0 4px; }
  .ok { color: #4ade80; } .err { color: #fb7185; }
  #hint { position: absolute; left: 12px; bottom: 10px; color: #8a97a8;
          background: rgba(14,17,22,.8); padding: 4px 8px; border-radius: 6px; }
  #coords { position: absolute; right: 12px; top: 10px; color: #cbd5e1;
            background: rgba(14,17,22,.85); padding: 4px 8px; border-radius: 6px;
            font-family: ui-monospace, monospace; font-size: 12px; pointer-events: none; }
  #legend { position: absolute; left: 12px; top: 10px; display: flex; gap: 12px;
            background: rgba(14,17,22,.85); padding: 4px 8px; border-radius: 6px;
            font-size: 11px; color: #cbd5e1; pointer-events: none; }
  #legend i { display: inline-block; width: 10px; height: 10px; border-radius: 2px;
              margin-right: 5px; vertical-align: middle; }
  textarea { width: 100%; height: 90px; background: #11161d; color: #9fe0b0;
             border: 1px solid #232b36; border-radius: 6px; font-family: ui-monospace, monospace; }
  .state-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
               margin-left: auto; flex-shrink: 0; }
  .state-dot[data-s="loaded"]  { background: #4ade80; }
  .state-dot[data-s="empty"]   { background: transparent; box-shadow: 0 0 0 1.5px #8a97a8; }
  .state-dot[data-s="invalid"] { background: #fb7185; }
  .state-dot[data-s="unknown"] { background: #2c3744; }
  .state-dot[data-s="edited"]  { background: #fbbf24; }
  .state-dot:not([data-s])     { display: none; }
</style>
</head>
<body>
<div id="side">
  <h1>RLD3-Target Zones</h1>

  <!-- MQTT broker connection + read. Top-down flow (§13): connect and read FIRST.
       The section names the broker (host/port/creds); the Sensor field names the
       target device — matching the Read/Write-from-Sensor button wording. -->
  <h2>MQTT Server</h2>
  <div class="row">
    <label>Host<input id="mqHost" value="homeassistant.local" placeholder="homeassistant.local" style="width:120px" /></label>
    <label>Port<input id="mqPort" value="1884" style="width:52px" /></label>
  </div>
  <div class="row" style="margin-bottom: 12px">
    <label>User<input id="mqUser" value="" placeholder="mqtt user" style="width:78px" /></label>
    <label>Pass<input id="mqPass" type="password" style="width:78px" /></label>
  </div>
  <!-- Connect sits with the Sensor it targets; the remaining device commands form
       the group below, all reporting to the one shared message window. Top-down:
       connect → read/write → delete → monitor. Delete is a device op, not an edit. -->
  <div class="row">
    <label>Sensor<input id="mqDev" value="" placeholder="Z2M friendly name" style="width:130px" /></label>
    <button id="mqConnect">Connect</button>
  </div>
  <div class="row">
    <button id="mqRead">Read from Sensor</button>
    <button id="mqProvision">Write to Sensor</button>
  </div>
  <div class="row">
    <button id="deleteZone">Delete from Sensor</button>
    <button id="mqLive">Live view: OFF</button>
  </div>
  <div id="mqStatus">not connected</div>

  <hr class="group-sep" />

  <h2>Mode</h2>
  <div class="row" id="modes">
    <button data-mode="draw">Draw</button>
    <button data-mode="edit">Edit</button>
    <button data-mode="sensor">Place Sensor</button>
    <button data-mode="pan" class="on">Pan</button>
  </div>
  <div class="row">
    <button id="finish">Finish (Enter)</button>
    <button id="clearZone">Clear drawing</button>
  </div>

  <h2>Zone</h2>
  <div id="zones"></div>

  <h2>Mounting</h2>
  <div class="row">
    <label>Yaw °<input type="number" id="yaw" value="0" step="0.1" min="-180" max="180" /></label>
  </div>
  <div class="row">
    <label><input type="checkbox" id="inverted" /> Inverted (ceiling)</label>
  </div>

  <!-- Pan Align (motorized yaw) — increment 1: manual jog + position readout.
       Full angle-null alignment (landmark/error/auto-approach) is increment 2.
       See _Documentation/pan-align-design.md. -->
  <h2>Pan Align</h2>
  <div class="row">
    <button id="panCCWc" title="CCW coarse (map view)">◄◄</button>
    <button id="panCCWf" title="CCW fine">◄</button>
    <button id="panCWf"  title="CW fine">►</button>
    <button id="panCWc"  title="CW coarse">►►</button>
    <button id="panStop" title="Stop" style="color:#fb7185">■</button>
  </div>
  <div class="row" style="gap:10px; align-items:center">
    <label>Coarse<input type="number" id="panCoarse" value="64" min="1" max="512" style="width:60px" /></label>
    <label>Fine<input type="number" id="panFine" value="8" min="1" max="128" style="width:52px" /></label>
    <span style="color:#8a97a8; font-size:11px">steps · 0.088°/step</span>
  </div>
  <div id="panStatus" style="font-family: ui-monospace, monospace; font-size:12px; background:#11161d; border:1px solid #232b36; border-radius:6px; padding:6px; margin-bottom:6px">pan: — steps (—°)</div>

  <h2>Validation</h2>
  <div id="status">—</div>

  <h2>Layout I/O</h2>
  <div class="row">
    <button id="export">Export JSON</button>
    <button id="import">Import JSON</button>
    <button id="z2m">Preview write commands (debug)</button>
  </div>
  <textarea id="io" placeholder="Exported layout / Z2M sets appear here; paste to import."></textarea>
</div>

<div id="stage">
  <canvas id="cv"></canvas>
  <div id="coords">room —, — mm · sensor —, — mm</div>
  <div id="legend">
    <span><i style="background:#7dd3fc"></i>optimal ±45°</span>
    <span><i style="background:#fbbf24"></i>extended ±60° · reduced</span>
  </div>
  <div id="hint"></div>
</div>

<script type="module">
import { validatePolygon, DEFAULT_MAX_VERTICES } from '../src/polygon_codec.js';
import { emptyLayout, layoutToJSON, layoutFromJSON } from '../src/layout.js';
import { layoutToZ2mSets, createZ2mAdapter, POLY_KEY, EXCL_KEY } from '../src/z2m_adapter.js';
import { layoutFromReports, ZONE_STATE, deviceReadKeys } from '../src/device_load.js';
import { markProvisioned } from '../src/layout_edit.js';
import { planFromLayouts, confirmPlan } from '../src/provision_glue.js';
import { mqttConnect } from './mqtt_ws.js';
import { sensorToRoom, roomToSensor } from '../src/geometry.js';
import {
  SENSOR_RANGE_R, SENSOR_RANGE_X, SENSOR_CONE_SWEET_DEG, SENSOR_FOV_FULL_DEG,
  SENSOR_RANGE_CURVE,
} from '../src/sensor_spec.js';
import {
  makeViewport, worldToScreen, screenToWorld, zoomAt, pan, fitBounds, pxToWorld,
} from './viewport.js';
import {
  nearestVertex, nearestEdge, shouldClosePolygon, insertVertexAfter, boundsOf,
} from './editing.js';

// --- Zone registry: id → label, colour, category, and accessors into the layout -
// Labels are DISPLAY-ONLY 1-based (installer-facing): "Presence 1" == wire index 0.
// The `id` strings (pres0, ez0_in, excl0…) remain 0-based, ZC-internal-only ids —
// they map through POLY_KEY/EXCL_KEY (z2m_adapter.js) to the 1-based Z2M topics
// (poly_pres_1, Phase N), and are otherwise unrelated to firmware logs, NVS keys
// (pres_0), or the attribute map, which all stay 0-based. Never renumber ids —
// presentation only. `cat` drives the toolbar grouping (blank line between
// categories; no category headings by request).
const ZONES = [
  { id: 'master', label: 'Room', color: '#ffd24a', kind: 'poly', cat: 'master' },
  { id: 'pres0', label: 'Presence 1', color: '#4ade80', kind: 'poly', cat: 'presence' },
  { id: 'pres1', label: 'Presence 2', color: '#22d3ee', kind: 'poly', cat: 'presence' },
  { id: 'pres2', label: 'Presence 3', color: '#60a5fa', kind: 'poly', cat: 'presence' },
  { id: 'pres3', label: 'Presence 4', color: '#a78bfa', kind: 'poly', cat: 'presence' },
  { id: 'pres4', label: 'Presence 5', color: '#f472b6', kind: 'poly', cat: 'presence' },   // V2.1 Delta B
  { id: 'pres5', label: 'Presence 6', color: '#fbbf24', kind: 'poly', cat: 'presence' },
  { id: 'pres6', label: 'Presence 7', color: '#fb923c', kind: 'poly', cat: 'presence' },
  { id: 'pres7', label: 'Presence 8', color: '#34d399', kind: 'poly', cat: 'presence' },
  { id: 'ez0_in', label: 'EZ1 Inner', color: '#fb7185', kind: 'poly', cat: 'ez' },
  { id: 'ez0_out', label: 'EZ1 Outer', color: '#f43f5e', kind: 'poly', cat: 'ez' },
  { id: 'ez1_in', label: 'EZ2 Inner', color: '#fda4af', kind: 'poly', cat: 'ez' },
  { id: 'ez1_out', label: 'EZ2 Outer', color: '#e11d48', kind: 'poly', cat: 'ez' },
  { id: 'excl0', label: 'Exclude 1', color: '#94a3b8', kind: 'rect', cat: 'exclude' },
  { id: 'excl1', label: 'Exclude 2', color: '#cbd5e1', kind: 'rect', cat: 'exclude' },
  { id: 'excl2', label: 'Exclude 3', color: '#64748b', kind: 'rect', cat: 'exclude' },
];
const zoneById = Object.fromEntries(ZONES.map((z) => [z.id, z]));

// LD2450 coverage (SENSOR frame, mm), shown as two nested regions:
//
//   SWEET SPOT  — ±45° cone (adaptive_filter.h FILTER_CONE_HALF_ANGLE_DEG),
//                 clipped to |x| ≤ 3000 (LD2450_parser.c), radial range ≤ 6000.
//                 What the firmware processes at best accuracy today.
//   EXTENDED    — the sensor's physical field of view (~±60° per datasheet),
//                 radial range ≤ 6000. It still detects out here but accuracy
//                 drops, and the current firmware cone filters it out — using it
//                 would mean widening FILTER_CONE_HALF_ANGLE_DEG. Drawn so the
//                 designer knows the reach exists (e.g. for a wall mount).
//
// Max range is RADIAL, so the far edge is a 6000 mm-radius arc, not a flat cut.
// Coverage constants live in src/sensor_spec.js (pinned to firmware by the contract test).

// Arc-topped sector clipped to |x| ≤ X (the firmware sweet spot).
function clippedSector(coneDeg) {
  const R = SENSOR_RANGE_R, X = SENSOR_RANGE_X;
  const coneY = X / Math.tan(coneDeg * Math.PI / 180); // cone edge meets |x|=X
  const boxArcY = Math.sqrt(R * R - X * X);            // |x|=X meets the arc
  const aMax = Math.asin(X / R);
  const pts = [{ x: 0, y: 0 }, { x: -X, y: Math.round(coneY) }, { x: -X, y: Math.round(boxArcY) }];
  for (let i = 0; i <= 28; i++) {
    const a = -aMax + (2 * aMax) * (i / 28);
    pts.push({ x: Math.round(R * Math.sin(a)), y: Math.round(R * Math.cos(a)) });
  }
  pts.push({ x: X, y: Math.round(coneY) });
  return pts;
}

// Physical tracking envelope (teardrop) sampled from the datasheet range curve.
function rangeAtAngle(deg) {
  const a = Math.abs(deg), c = SENSOR_RANGE_CURVE, last = c[c.length - 1];
  if (a >= last.deg) return last.mm;
  for (let i = 0; i < c.length - 1; i++) {
    if (a <= c[i + 1].deg) {
      const t = (a - c[i].deg) / (c[i + 1].deg - c[i].deg);
      return c[i].mm + t * (c[i + 1].mm - c[i].mm);
    }
  }
  return c[0].mm;
}
function physicalEnvelope() {
  const pts = [];
  for (let d = -90; d <= 90; d += 5) {
    const r = rangeAtAngle(d), a = d * Math.PI / 180;
    pts.push({ x: Math.round(r * Math.sin(a)), y: Math.round(r * Math.cos(a)) });
  }
  return pts;
}

const SWEET_ENVELOPE = clippedSector(SENSOR_CONE_SWEET_DEG);
const FULL_ENVELOPE = physicalEnvelope();

// --- App state -----------------------------------------------------------------
const mount = { yawDeciDeg: 0, inverted: false };
const sensor = { x: 0, y: 0 };   // sensor position in ABSOLUTE room frame (§11)
const polys = {};            // id → [{x,y}] ABSOLUTE-frame vertices for poly zones
const rects = {};            // id → {x1,y1,x2,y2} SENSOR-frame rect for excl zones
let activeId = 'master';
let mode = 'pan';   // Pan is the safe default — no inadvertent drawing on first click.
let draft = [];              // vertices being drawn (poly) or [corner] (rect)
let selVert = -1;
let dragging = false;
let panLast = null;
let rectDragOrig = null;     // { rect, startSensor } while moving an exclusion body
let polyDragOrig = null;     // { verts, start } while moving a whole polygon zone
let sensorPlacing = false;   // dragging the sensor in 'sensor' mode

// --- Device read state (A1/A2) -------------------------------------------------
let deviceReports = {};       // merged JSON from device state topic during a Read
let loadedZoneStates = null;  // zoneStates returned by the last layoutFromReports
let deviceBaseline = null;    // deep snapshot of polys at read time (badge dirty-detect)
let deviceBaselineLayout = null; // the read-back layout (wire frame) — A3 provision baseline
// C1: set by the provision handler so the following re-read can diff against the write.
let pendingConfirm = null;    // { plan, writtenLayout } | null
// D3: set by the delete handler so the following re-read can confirm the zone is EMPTY.
let pendingDelete = null;     // { zoneId } | null

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let vp = makeViewport({ scale: 0.08, tx: 0, ty: 0 });

function resize() {
  const r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width; cv.height = r.height;
  draw();
}
window.addEventListener('resize', resize);

function fitView() {
  vp = fitBounds({ xmin: -4200, xmax: 4200, ymin: -300, ymax: 8000 },
    { w: cv.width, h: cv.height }, 30);
  draw();
}

// --- Rendering -----------------------------------------------------------------
function w2s(p) { return worldToScreen(vp, p); }

// §11: sensor/room-frame point <-> ABSOLUTE room coords (placement = translation).
function sensorToAbs(p) { const r = sensorToRoom(p, mount); return { x: r.x + sensor.x, y: r.y + sensor.y }; }
function absToSensor(p) { return roomToSensor({ x: p.x - sensor.x, y: p.y - sensor.y }, mount); }

/** The 4 ABSOLUTE-frame corners of a sensor-frame rect (sensor placement applied). */
function rectRoomCorners(r) {
  return [
    { x: r.x1, y: r.y1 }, { x: r.x2, y: r.y1 },
    { x: r.x2, y: r.y2 }, { x: r.x1, y: r.y2 },
  ].map(sensorToAbs);
}

function draw() {
  ctx.clearRect(0, 0, cv.width, cv.height);
  drawGrid();
  drawEnvelope();
  drawSensor();
  for (const z of ZONES) drawZone(z);
  drawDraft();
  drawLiveTargets();
  drawAxisLegend();
  refreshStatus();
  updateHint();
  updateZoneBadges();
  updateFinishButton();
  updateDeleteButton();
}

function drawGrid() {
  const step = 500;
  const tl = screenToWorld(vp, { sx: 0, sy: 0 });
  const br = screenToWorld(vp, { sx: cv.width, sy: cv.height });
  const x0 = Math.floor(tl.x / step) * step, x1 = Math.ceil(br.x / step) * step;
  const y0 = Math.floor(br.y / step) * step, y1 = Math.ceil(tl.y / step) * step;
  ctx.lineWidth = 1;
  for (let x = x0; x <= x1; x += step) {
    const a = w2s({ x, y: y0 }), b = w2s({ x, y: y1 });
    ctx.strokeStyle = x === 0 ? '#3b4654' : '#1c232c';
    ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();
  }
  for (let y = y0; y <= y1; y += step) {
    const a = w2s({ x: x0, y }), b = w2s({ x: x1, y });
    ctx.strokeStyle = y === 0 ? '#3b4654' : '#1c232c';
    ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();
  }
}

// Fixed-screen axis indicator (bottom-right). World is +x right / +y forward
// (up on screen) and the viewport never rotates, so X always points right and
// Y always points up — a constant legend, not a transformed one.
function drawAxisLegend() {
  const L = 30, ox = cv.width - 56, oy = cv.height - 78;
  const head = (x, y, ang, col) => {
    const s = 6;
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x - s * Math.cos(ang - 0.4), y - s * Math.sin(ang - 0.4));
    ctx.lineTo(x - s * Math.cos(ang + 0.4), y - s * Math.sin(ang + 0.4));
    ctx.closePath(); ctx.fill();
  };
  ctx.save();
  ctx.lineWidth = 2; ctx.lineCap = 'round';
  ctx.font = '600 12px ui-sans-serif, system-ui, sans-serif';
  ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
  const xCol = '#e07a5f', yCol = '#81b29a';
  // X → right
  ctx.strokeStyle = xCol;
  ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ox + L, oy); ctx.stroke();
  head(ox + L, oy, 0, xCol);
  ctx.fillStyle = xCol; ctx.fillText('X', ox + L + 9, oy);
  // Y → up (screen -y)
  ctx.strokeStyle = yCol;
  ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ox, oy - L); ctx.stroke();
  head(ox, oy - L, -Math.PI / 2, yCol);
  ctx.fillStyle = yCol; ctx.fillText('Y', ox, oy - L - 10);
  ctx.restore();
}

// Live targets stream in post-mount room frame (sensor at origin), so they
// plot at sensor position + target — no yaw re-application (the device already
// applied it). Cyan dots; the empty-slot sentinel arrives as null.
let liveTargets = [];

// liveTargets is the converter-decoded `targets` array from the device state
// topic: 3 slots of { x, y } mm in the post-mount room frame, empty slots null.
function drawLiveTargets() {
  for (const t of liveTargets) {
    if (!t) continue;
    const s = w2s({ x: sensor.x + t.x, y: sensor.y + t.y });
    ctx.beginPath(); ctx.arc(s.sx, s.sy, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#22d3ee'; ctx.fill();
    ctx.lineWidth = 1.5; ctx.strokeStyle = '#0e7490'; ctx.stroke();
  }
}

function drawRegion(env, fill, stroke) {
  const pts = env.map((c) => w2s(sensorToAbs(c)));
  ctx.beginPath();
  pts.forEach((s, i) => (i ? ctx.lineTo(s.sx, s.sy) : ctx.moveTo(s.sx, s.sy)));
  ctx.closePath();
  ctx.fillStyle = fill; ctx.fill();
  ctx.strokeStyle = stroke; ctx.lineWidth = 1.5; ctx.setLineDash([8, 5]);
  ctx.stroke(); ctx.setLineDash([]);
}

function drawEnvelope() {
  // Extended physical FOV first (behind), then the optimal sweet spot on top.
  drawRegion(FULL_ENVELOPE, 'rgba(251,191,36,0.05)', 'rgba(251,191,36,0.45)');   // amber = degraded
  drawRegion(SWEET_ENVELOPE, 'rgba(56,189,248,0.07)', 'rgba(125,211,252,0.6)');  // cyan = optimal
}

function drawSensor() {
  const o = w2s({ x: sensor.x, y: sensor.y });
  const tip = w2s(sensorToAbs({ x: 0, y: 1500 }));
  ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(o.sx, o.sy); ctx.lineTo(tip.sx, tip.sy); ctx.stroke();
  ctx.fillStyle = mode === 'sensor' ? '#fbbf24' : '#e2e8f0';
  ctx.beginPath(); ctx.arc(o.sx, o.sy, mode === 'sensor' ? 7 : 5, 0, Math.PI * 2); ctx.fill();
}

function drawZone(z) {
  const isActive = z.id === activeId;
  if (z.kind === 'poly') {
    const pts = polys[z.id];
    if (!pts || pts.length === 0) return;
    drawPoly(pts, z.color, isActive, true);
    if (isActive && mode === 'edit') drawHandles(pts, z.color);
  } else {
    const r = rects[z.id]; // stored in SENSOR frame
    if (!r) return;
    // Sensor-frame axis-aligned rect → room-frame quad (rotates/flips with mount).
    const corners = rectRoomCorners(r);
    drawPoly(corners, z.color, isActive, true, true);
    if (isActive && mode === 'edit') drawHandles(corners, z.color);
  }
}

function drawPoly(pts, color, active, closed, dashed = false) {
  ctx.lineWidth = active ? 2.5 : 1.5;
  ctx.strokeStyle = color;
  ctx.setLineDash(dashed ? [6, 4] : []);
  ctx.beginPath();
  pts.forEach((p, i) => { const s = w2s(p); i ? ctx.lineTo(s.sx, s.sy) : ctx.moveTo(s.sx, s.sy); });
  if (closed) ctx.closePath();
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = color + (active ? '22' : '12');
  ctx.fill();
}

function drawHandles(pts, color) {
  pts.forEach((p, i) => {
    const s = w2s(p);
    ctx.fillStyle = i === selVert ? '#fff' : color;
    ctx.beginPath(); ctx.arc(s.sx, s.sy, 6, 0, Math.PI * 2); ctx.fill();
    ctx.lineWidth = 1.5; ctx.strokeStyle = '#0e1116'; ctx.stroke();
  });
}

function drawDraft() {
  if (draft.length === 0) return;
  const z = zoneById[activeId];
  if (z.kind === 'poly') {
    ctx.strokeStyle = z.color; ctx.lineWidth = 2; ctx.setLineDash([4, 3]);
    ctx.beginPath();
    draft.forEach((p, i) => { const s = w2s(p); i ? ctx.lineTo(s.sx, s.sy) : ctx.moveTo(s.sx, s.sy); });
    ctx.stroke(); ctx.setLineDash([]);
    draft.forEach((p) => { const s = w2s(p); ctx.fillStyle = z.color;
      ctx.beginPath(); ctx.arc(s.sx, s.sy, 4, 0, Math.PI * 2); ctx.fill(); });
  }
}

// --- Pointer interaction -------------------------------------------------------
function evWorld(e) {
  const r = cv.getBoundingClientRect();
  return screenToWorld(vp, { sx: e.clientX - r.left, sy: e.clientY - r.top });
}
function round(p) { return { x: Math.round(p.x), y: Math.round(p.y) }; }

/** Even-odd point-in-polygon for float {x,y} room corners (exclusion body hit). */
function pointInPoly(pts, p) {
  let inside = false;
  for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
    const a = pts[i], b = pts[j];
    if (((a.y > p.y) !== (b.y > p.y)) &&
        (p.x < ((b.x - a.x) * (p.y - a.y)) / (b.y - a.y) + a.x)) inside = !inside;
  }
  return inside;
}

function updateCoords(e) {
  const w = evWorld(e);
  const sf = absToSensor(w);
  document.getElementById('coords').textContent =
    `room ${Math.round(w.x)}, ${Math.round(w.y)} mm · sensor ${Math.round(sf.x)}, ${Math.round(sf.y)} mm`;
}

cv.addEventListener('mousedown', (e) => {
  const wp = evWorld(e);
  if (mode === 'pan' || e.button === 1) { panLast = { x: e.clientX, y: e.clientY }; return; }
  if (mode === 'sensor') {
    sensor.x = Math.round(wp.x); sensor.y = Math.round(wp.y);
    sensorPlacing = true; dragging = true; draw(); return;
  }
  const z = zoneById[activeId];

  if (mode === 'draw') {
    if (z.kind === 'poly') {
      const closeDist = pxToWorld(vp, 10);
      if (shouldClosePolygon(draft, wp, closeDist)) return finishDraft();
      if (draft.length < DEFAULT_MAX_VERTICES) draft.push(round(wp));
      draw();
    } else { // rect: two room clicks → axis-aligned SENSOR-frame rect (§6)
      if (draft.length === 0) draft.push(wp);
      else {
        const a = absToSensor(draft[0]), b = absToSensor(wp);
        rects[z.id] = norm(round(a), round(b));
        draft = []; draw();
      }
    }
    return;
  }

  if (mode === 'edit' && z.kind === 'poly' && polys[z.id]) {
    const hit = nearestVertex(polys[z.id], wp, pxToWorld(vp, 8));
    if (hit >= 0) { selVert = hit; polyDragOrig = null; dragging = true; draw(); return; }
    const edge = nearestEdge(polys[z.id], wp, pxToWorld(vp, 8));
    if (edge >= 0 && polys[z.id].length < DEFAULT_MAX_VERTICES) {
      polys[z.id] = insertVertexAfter(polys[z.id], edge, wp);
      selVert = edge + 1; polyDragOrig = null; dragging = true; draw(); return;
    }
    if (pointInPoly(polys[z.id], wp)) {          // drag interior → move the whole zone
      polyDragOrig = { verts: polys[z.id].map((v) => ({ ...v })), start: wp };
      selVert = -1; dragging = true; draw();
    }
  }

  if (mode === 'edit' && z.kind === 'rect' && rects[z.id]) {
    const corners = rectRoomCorners(rects[z.id]);
    const hit = nearestVertex(corners, wp, pxToWorld(vp, 12));
    if (hit >= 0) { selVert = hit; rectDragOrig = null; dragging = true; draw(); return; }
    if (pointInPoly(corners, wp)) {        // grab inside the box → move it
      selVert = -1; dragging = true;
      rectDragOrig = { rect: { ...rects[z.id] }, startSensor: absToSensor(wp) };
      draw();
    }
  }
});

cv.addEventListener('mousemove', (e) => {
  updateCoords(e);
  if (panLast) {
    vp = pan(vp, e.clientX - panLast.x, e.clientY - panLast.y);
    panLast = { x: e.clientX, y: e.clientY }; draw(); return;
  }
  if (!dragging) return;
  if (sensorPlacing) { const w = evWorld(e); sensor.x = Math.round(w.x); sensor.y = Math.round(w.y); draw(); return; }
  const kind = zoneById[activeId].kind;
  if (kind === 'poly' && polys[activeId]) {
    if (polyDragOrig) {                    // move whole zone: translate all vertices
      const cur = evWorld(e);
      const dx = Math.round(cur.x - polyDragOrig.start.x);
      const dy = Math.round(cur.y - polyDragOrig.start.y);
      polys[activeId] = polyDragOrig.verts.map((v) => ({ x: v.x + dx, y: v.y + dy }));
      draw();
    } else if (selVert >= 0) {
      polys[activeId][selVert] = round(evWorld(e)); draw();
    }
  } else if (kind === 'rect' && rects[activeId]) {
    const r = rects[activeId];
    if (rectDragOrig) {                    // move whole box: translate in sensor frame
      const cur = absToSensor(evWorld(e));
      const dx = Math.round(cur.x - rectDragOrig.startSensor.x);
      const dy = Math.round(cur.y - rectDragOrig.startSensor.y);
      const o = rectDragOrig.rect;
      rects[activeId] = { x1: o.x1 + dx, y1: o.y1 + dy, x2: o.x2 + dx, y2: o.y2 + dy };
      draw();
    } else if (selVert >= 0) {             // resize: move the two sensor edges at this corner
      const sp = round(absToSensor(evWorld(e)));
      if (selVert === 0) { r.x1 = sp.x; r.y1 = sp.y; }
      else if (selVert === 1) { r.x2 = sp.x; r.y1 = sp.y; }
      else if (selVert === 2) { r.x2 = sp.x; r.y2 = sp.y; }
      else { r.x1 = sp.x; r.y2 = sp.y; }
      draw();
    }
  }
});
window.addEventListener('mouseup', () => {
  // Re-order a resized exclusion so x1<x2, y1<y2 (corner may have crossed over).
  if (dragging && !rectDragOrig && zoneById[activeId] && zoneById[activeId].kind === 'rect' && rects[activeId]) {
    const r = rects[activeId];
    rects[activeId] = norm({ x: r.x1, y: r.y1 }, { x: r.x2, y: r.y2 });
  }
  dragging = false; panLast = null; rectDragOrig = null; polyDragOrig = null; sensorPlacing = false;
});

cv.addEventListener('wheel', (e) => {
  e.preventDefault();
  const r = cv.getBoundingClientRect();
  vp = zoomAt(vp, e.deltaY < 0 ? 1.1 : 1 / 1.1, { sx: e.clientX - r.left, sy: e.clientY - r.top });
  draw();
}, { passive: false });

cv.addEventListener('dblclick', () => { if (mode === 'draw') finishDraft(); });

window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'Enter') finishDraft();
  else if (e.key === 'Escape') { draft = []; draw(); }
  else if ((e.key === 'Delete' || e.key === 'Backspace') && mode === 'edit' && selVert >= 0) {
    const p = polys[activeId];
    if (p && p.length > 3) { p.splice(selVert, 1); selVert = -1; draw(); }
  }
});

function finishDraft() {
  const z = zoneById[activeId];
  if (z.kind === 'poly' && draft.length >= 3) { polys[z.id] = draft.slice(); }
  draft = []; draw();
}
function updateFinishButton() {
  document.getElementById('finish').disabled = !(mode === 'draw' && draft.length > 0);
}
// Phase D: only meaningful for a zone the device actually reports as LOADED —
// nothing to delete from an EMPTY/UNKNOWN/INVALID zone (and no connection means
// no state to check at all).
function updateDeleteButton() {
  document.getElementById('deleteZone').disabled = (stateForZoneId(activeId) !== ZONE_STATE.LOADED);
}
function norm(a, b) {
  return { x1: Math.min(a.x, b.x), y1: Math.min(a.y, b.y), x2: Math.max(a.x, b.x), y2: Math.max(a.y, b.y) };
}

// --- Status / validation -------------------------------------------------------
function refreshStatus() {
  const z = zoneById[activeId];
  const s = document.getElementById('status');
  if (z.kind === 'poly') {
    const pts = polys[z.id];
    if (!pts) { s.textContent = `${z.label}: empty`; s.className = ''; return; }
    const v = validatePolygon(pts, { maxVertices: DEFAULT_MAX_VERTICES });
    const bb = boundsOf(pts, null);
    const dims = bb ? ` · ${bb.xmax - bb.xmin}×${bb.ymax - bb.ymin} mm` : '';
    s.textContent = `${z.label}: ${pts.length} verts${dims}\n` + (v.ok ? 'valid ✓' : v.errors.join('\n'));
    s.className = v.ok ? 'ok' : 'err';
  } else {
    const r = rects[z.id];
    if (!r) { s.textContent = `${z.label}: empty`; s.className = ''; return; }
    s.textContent = `${z.label} (sensor frame):\n${r.x1},${r.y1},${r.x2},${r.y2}`
      + `\n${r.x2 - r.x1}×${r.y2 - r.y1} mm`;
    s.className = 'ok';
  }
}
function updateHint() {
  const isRect = zoneById[activeId].kind === 'rect';
  let h;
  if (mode === 'draw') {
    h = isRect ? 'Draw: click two opposite corners to place the exclusion rectangle. Wheel=zoom.'
               : 'Draw: click to add vertices; click the first point / Enter to close. Wheel=zoom.';
  } else if (mode === 'edit') {
    h = isRect ? 'Edit: drag a corner handle to resize, or drag inside the box to move it.'
               : 'Edit: drag a vertex, drag inside to move the zone, click an edge to add a vertex, Del removes.';
  } else if (mode === 'sensor') {
    h = 'Sensor: click or drag to place the sensor; set Yaw / Inverted to aim its field of view.';
  } else {
    h = 'Pan: drag to move. Wheel=zoom.';
  }
  document.getElementById('hint').textContent = h;
}

// --- Layout <-> app state ------------------------------------------------------
function appToLayout() {
  const L = emptyLayout();
  L.mount = { ...mount };
  // §11: polygons are drawn in ABSOLUTE coords; the wire room frame is sensor-at-
  // origin, so translate by -sensor_position. Exclusions are already sensor-frame.
  const tr = (verts) => verts.map((v) => ({ x: v.x - sensor.x, y: v.y - sensor.y }));
  L.master = polys.master ? { vertices: tr(polys.master) } : null;
  for (let n = 0; n < 8; n++) L.presence[n] = polys['pres' + n] ? { vertices: tr(polys['pres' + n]) } : null;   // V2.1 Delta B
  for (let p = 0; p < 2; p++) {
    const inn = polys[`ez${p}_in`], out = polys[`ez${p}_out`];
    L.entryExit[p] = (inn || out) ? { inner: inn ? { vertices: tr(inn) } : null, outer: out ? { vertices: tr(out) } : null } : null;
  }
  for (let n = 0; n < 3; n++) L.exclusions[n] = rects['excl' + n] ? { ...rects['excl' + n] } : null;
  return L;
}

// --- UI wiring -----------------------------------------------------------------
const zonesEl = document.getElementById('zones');
let curCat = null, catEl = null;
ZONES.forEach((z) => {
  if (z.cat !== curCat) {                 // new category → new group (spaced by CSS gap)
    curCat = z.cat;
    catEl = document.createElement('div');
    catEl.className = 'zone-cat';
    zonesEl.appendChild(catEl);
  }
  const b = document.createElement('button');
  b.innerHTML = `<span class="swatch" style="background:${z.color}"></span>${z.label}<span class="state-dot" data-zone="${z.id}"></span>`;
  b.onclick = () => { activeId = z.id; draft = []; selVert = -1; syncZoneButtons(); draw(); };
  b.dataset.zone = z.id; catEl.appendChild(b);
});
function syncZoneButtons() {
  zonesEl.querySelectorAll('button').forEach((b) => b.classList.toggle('on', b.dataset.zone === activeId));
}

// --- Zone state badges (A2) ----------------------------------------------------
function stateForZoneId(id) {
  if (!loadedZoneStates) return null;
  if (id === 'master') return loadedZoneStates.master;
  if (id.startsWith('pres')) return loadedZoneStates.presence[parseInt(id.slice(4), 10)];
  if (id === 'ez0_in') return loadedZoneStates.entryExit[0].inner;
  if (id === 'ez0_out') return loadedZoneStates.entryExit[0].outer;
  if (id === 'ez1_in') return loadedZoneStates.entryExit[1].inner;
  if (id === 'ez1_out') return loadedZoneStates.entryExit[1].outer;
  if (id.startsWith('excl')) return loadedZoneStates.exclusions[parseInt(id.slice(4), 10)];
  return ZONE_STATE.UNKNOWN;
}

/** Map a ZC-internal zone id to its converter property key (Phase D delete). */
function propKeyForZoneId(id) {
  if (id === 'master') return POLY_KEY.master;
  if (id.startsWith('pres')) return POLY_KEY.presence[parseInt(id.slice(4), 10)];
  if (id === 'ez0_in') return POLY_KEY.ez[0].inner;
  if (id === 'ez0_out') return POLY_KEY.ez[0].outer;
  if (id === 'ez1_in') return POLY_KEY.ez[1].inner;
  if (id === 'ez1_out') return POLY_KEY.ez[1].outer;
  if (id.startsWith('excl')) return EXCL_KEY[parseInt(id.slice(4), 10)];
  return null;
}

function polyDirty(id) {
  if (!deviceBaseline) return false;
  const cur = polys[id], base = deviceBaseline[id];
  if (!cur && !base) return false;
  if (!cur || !base) return true;
  if (cur.length !== base.length) return true;
  return cur.some((v, i) => v.x !== base[i].x || v.y !== base[i].y);
}

function rectDirty(id) {
  if (!deviceBaseline) return false;
  const cur = rects[id], base = deviceBaseline[id];
  if (!cur && !base) return false;
  if (!cur || !base) return true;
  return cur.x1 !== base.x1 || cur.y1 !== base.y1 || cur.x2 !== base.x2 || cur.y2 !== base.y2;
}

function zoneBadgeState(id) {
  if (!loadedZoneStates) return null;
  const z = zoneById[id];
  if (z.kind === 'poly' && polyDirty(id)) return 'edited';
  if (z.kind === 'rect' && rectDirty(id)) return 'edited';
  return stateForZoneId(id);
}

function updateZoneBadges() {
  document.querySelectorAll('.state-dot[data-zone]').forEach((dot) => {
    const s = zoneBadgeState(dot.dataset.zone);
    if (s) dot.setAttribute('data-s', s);
    else dot.removeAttribute('data-s');
  });
}
document.getElementById('modes').onclick = (e) => {
  if (!e.target.dataset.mode) return;
  mode = e.target.dataset.mode; draft = []; selVert = -1;
  [...e.currentTarget.children].forEach((b) => b.classList.toggle('on', b.dataset.mode === mode));
  cv.style.cursor = mode === 'pan' ? 'grab' : 'crosshair';
  draw();
};
document.getElementById('finish').onclick = finishDraft;
document.getElementById('clearZone').onclick = () => {
  delete polys[activeId]; delete rects[activeId]; draft = []; selVert = -1; draw();
};
// Field is in DEGREES (intuitive); the wire attr 0x0100 is 0.1° units, so store deci-degrees.
document.getElementById('yaw').oninput = (e) => { mount.yawDeciDeg = Math.round((parseFloat(e.target.value) || 0) * 10); draw(); };
document.getElementById('inverted').onchange = (e) => { mount.inverted = e.target.checked; draw(); };

// Tool layout JSON = ABSOLUTE polygons + sensor placement (round-trips for editing).
// The device-facing wire layout is produced separately by appToLayout() (Z2M sets).
function toolToJSON() {
  return JSON.stringify({
    version: 2, tool: 'rld3-configurator',
    sensor: { x: sensor.x, y: sensor.y, yawDeciDeg: mount.yawDeciDeg, inverted: mount.inverted },
    polys, rects,
  }, null, 2);
}
function toolFromJSON(text) {
  const o = JSON.parse(text);
  if (o.version !== 2 || !o.sensor) throw new Error('not a v2 tool layout');
  sensor.x = Math.round(o.sensor.x || 0); sensor.y = Math.round(o.sensor.y || 0);
  mount.yawDeciDeg = o.sensor.yawDeciDeg || 0; mount.inverted = !!o.sensor.inverted;
  document.getElementById('yaw').value = mount.yawDeciDeg / 10;
  document.getElementById('inverted').checked = mount.inverted;
  for (const k of Object.keys(polys)) delete polys[k];
  for (const k of Object.keys(rects)) delete rects[k];
  Object.assign(polys, o.polys || {});
  Object.assign(rects, o.rects || {});
  draw();
}

document.getElementById('export').onclick = () => {
  document.getElementById('io').value = toolToJSON();
};
document.getElementById('z2m').onclick = () => {
  try { document.getElementById('io').value = JSON.stringify(layoutToZ2mSets(appToLayout()), null, 2); }
  catch (err) { document.getElementById('io').value = 'ERROR: ' + err.message; }
};
document.getElementById('import').onclick = () => {
  try { toolFromJSON(document.getElementById('io').value); }
  catch (err) { alert('Import failed: ' + err.message); }
};

// --- Live device provisioning (MQTT over WebSocket) ----------------------------
let z2mAdapter = null, z2mClient = null;
let liveDevice = '', liveOn = false, liveKeepAlive = null, livePoll = null, liveAutoOff = null;
// Auto-off is a safety stop, not a UX limit: if the user forgets Live view on, it
// otherwise polls `/get` every 300ms forever, spamming the MQTT bus. 30 min is far
// longer than any real config session, so it never interrupts legitimate use.
const LIVE_AUTOOFF_MS = 30 * 60 * 1000;
const mqStatus = document.getElementById('mqStatus');
const setMq = (t, cls) => { mqStatus.textContent = t; mqStatus.className = cls || ''; };
// One shared message window: connect, read, write, delete and live-view feedback
// all report here, directly under the Device command group that produces them.
const setWrite = setMq;

document.getElementById('mqConnect').onclick = async () => {
  const host = document.getElementById('mqHost').value.trim();
  const port = document.getElementById('mqPort').value.trim();
  const user = document.getElementById('mqUser').value;
  const pass = document.getElementById('mqPass').value;
  const device = document.getElementById('mqDev').value.trim();
  setMq(`connecting to ws://${host}:${port} …`);
  try {
    if (z2mClient) z2mClient.end();
    const client = await mqttConnect({ url: `ws://${host}:${port}`, username: user || undefined, password: pass || undefined });
    const transport = {
      publish: (t, p) => client.publish(t, p),
      subscribe: (t, h) => { client.subscribe(t); client.onMessage((tp, m) => { if (tp === t) h(m); }); },
    };
    z2mAdapter = createZ2mAdapter({ transport, device });
    z2mClient = client;
    liveDevice = device;
    // The device state topic carries live_view confirmation and the polled `targets`
    // stream: setLive() polls `<device>/get {targets:''}`, the converter reads the
    // octet from cluster 0xFDCD and republishes it here as `targets`. (Octet
    // *reporting* crashes the device SDK, so it is a poll, not a report.)
    client.subscribe(`zigbee2mqtt/${device}`);
    client.onMessage((tp, m) => {
      const raw = typeof m === 'string' ? m : new TextDecoder().decode(m);
      if (tp !== `zigbee2mqtt/${device}`) return;
      let s; try { s = JSON.parse(raw); } catch { return; }
      Object.assign(deviceReports, s);  // accumulate for Read from device
      if (s.live_view != null) { liveOn = (s.live_view === 'ON' || s.live_view === true); updateLiveBtn(); }
      if (s.targets !== undefined) { liveTargets = Array.isArray(s.targets) ? s.targets : []; draw(); }
      if (s.pan_position !== undefined) { panPosition = s.pan_position; panUpdateReadout(); }
      if (s.pan_limit !== undefined) { panLimit = s.pan_limit; panUpdateReadout(); }
    });
    setMq(`connected · sensor "${device}"`, 'ok');
  } catch (e) {
    z2mAdapter = null;
    setMq('connect failed: ' + e.message, 'err');
  }
};

// SAFE provision (A3): read-modify-write. Build an edit session from the device
// baseline layout, apply the operator's current geometry as edits, build the
// host-tested provision plan (empty-over-real / invalid drafts skipped), confirm,
// then write one set per frame and re-read to verify. The baseline→session→plan
// glue is pure and host-tested in src/provision_glue.js.
document.getElementById('mqProvision').onclick = () => {
  if (!z2mAdapter) { setWrite('not connected — hit Connect first', 'err'); return; }
  try {
    // Baseline = the last device read (wire frame), or empty if no read yet.
    const { session, plan } = planFromLayouts(deviceBaselineLayout, appToLayout());
    if (plan.sets.length === 0) {
      // A cleared loaded zone is a real change the BULK plan deliberately refuses
      // to write — a blank is never sent over live device state. Deleting a zone
      // is a separate, explicit action (Phase D). Say so instead of "no changes".
      const cleared = plan.skipped.filter((s) => s.reason === 'empty-not-written');
      let msg, cls = '';
      if (cleared.length) {
        msg = `⚠ ${cleared.map((s) => s.zone).join(', ')} cleared here but NOT removed from the sensor.\n`
            + 'Write to Sensor cannot delete a zone (a blank is never written over real\n'
            + 'device state). Select the zone and use "Delete from Sensor" instead.';
        cls = 'err';
      } else {
        msg = 'nothing to write — no changes from the device baseline';
      }
      if (plan.warnings.length) msg += '\n⚠ ' + plan.warnings.join('\n⚠ ');
      setWrite(msg, cls);
      return;
    }

    // Confirm dialog: WRITE / SKIP(non-trivial) / warnings.
    const lines = [];
    for (const s of plan.sets) lines.push(`WRITE  ${s.key}`);
    for (const s of plan.skipped) if (s.reason !== 'unchanged') lines.push(`SKIP   ${s.zone} (${s.reason})`);
    for (const w of plan.warnings) lines.push(`⚠ ${w}`);
    if (!deviceBaselineLayout) lines.push('(no device read this session — baseline treated as empty)');
    if (!window.confirm(`Write to "${liveDevice}"?\n\n${lines.join('\n')}`)) {
      setWrite('write cancelled', '');
      return;
    }

    const writtenLayout = appToLayout();  // snapshot before any async re-read
    for (const { key, value } of plan.sets) z2mAdapter.setKey(key, value);
    markProvisioned(session, plan);
    pendingConfirm = { plan, writtenLayout };
    setWrite(`wrote ${plan.sets.length} set(s); re-reading to confirm…`, 'ok');
    // Re-read after the writes settle (Z2M serializes per device).
    setTimeout(() => document.getElementById('mqRead').click(), 800);
  } catch (e) {
    setWrite('write failed: ' + e.message, 'err');
  }
};

// Phase D: explicit per-zone delete. Deliberately OUTSIDE the bulk provision
// plan — a dedicated, single-zone action, not a side effect of Write to Sensor.
// Sends an empty value for the active zone's converter key: the converter (D2)
// turns that into a zero-length octet (polygons) or the LD2450's own "unused"
// convention "0,0,0,0" (exclusions); the firmware (D1) erases the NVS/LD2450
// state and refreshes read-back to EMPTY. Re-reads afterward and reports
// success only once the device itself confirms the zone is gone.
document.getElementById('deleteZone').onclick = () => {
  if (!z2mAdapter) { setWrite('not connected — hit Connect first', 'err'); return; }
  const z = zoneById[activeId];
  const key = propKeyForZoneId(activeId);
  if (!key) { setWrite(`cannot delete "${z.label}": no device key for this zone`, 'err'); return; }
  if (stateForZoneId(activeId) !== ZONE_STATE.LOADED) {
    setWrite(`${z.label} is not currently loaded on the sensor — nothing to delete`, '');
    return;
  }
  if (!window.confirm(`Delete "${z.label}" from "${liveDevice}"?\n\n`
      + 'This erases it from the sensor immediately. It is separate from Write to\n'
      + 'Sensor and is not affected by unsaved edits to other zones.')) {
    setWrite('delete cancelled', '');
    return;
  }

  z2mAdapter.setKey(key, '');
  pendingDelete = { zoneId: activeId };
  setWrite(`deleting ${z.label}; re-reading to confirm…`, 'ok');
  setTimeout(() => document.getElementById('mqRead').click(), 800);
};

document.getElementById('mqRead').onclick = () => {
  if (!z2mAdapter) { setMq('not connected — hit Connect first', 'err'); return; }
  setMq('reading from sensor…');
  deviceReports = {};

  const allKeys = deviceReadKeys();
  // Scalars (yaw, inverted) may batch; each polygon/exclusion octet gets its own
  // read request — batching truncates to 29 B (APDU limit, proven W1).
  const scalarKeys = allKeys.slice(0, 2);
  const blobKeys = allKeys.slice(2);
  z2mAdapter.readKeys(scalarKeys);
  for (const k of blobKeys) z2mAdapter.readKeys([k]);

  setTimeout(() => {
    const { layout, zoneStates: states, warnings } = layoutFromReports(deviceReports);

    // Place sensor at origin — device polygons are room-frame at sensor origin → 1:1 absolute.
    sensor.x = 0; sensor.y = 0;

    // Populate poly zones from the device read.
    const setOrClear = (id, verts) => { if (verts) polys[id] = verts; else delete polys[id]; };
    setOrClear('master', layout.master?.vertices);
    for (let n = 0; n < 8; n++) setOrClear('pres' + n, layout.presence[n]?.vertices);   // V2.1 Delta B
    for (let p = 0; p < 2; p++) {
      setOrClear(`ez${p}_in`, layout.entryExit[p]?.inner?.vertices);
      setOrClear(`ez${p}_out`, layout.entryExit[p]?.outer?.vertices);
    }
    // Populate exclusions (Phase B read-back). Both sides are SENSOR frame — the
    // mount is applied only at render (rectRoomCorners) — so this is a direct copy.
    for (let n = 0; n < 3; n++) {
      const r = layout.exclusions[n];
      if (r) rects['excl' + n] = { x1: r.x1, y1: r.y1, x2: r.x2, y2: r.y2 };
      else delete rects['excl' + n];
    }

    // Adopt device mount (yaw + inverted) only when the device reported it.
    if (states.mount === ZONE_STATE.LOADED) {
      mount.yawDeciDeg = layout.mount.yawDeciDeg;
      mount.inverted = layout.mount.inverted;
      document.getElementById('yaw').value = mount.yawDeciDeg / 10;
      document.getElementById('inverted').checked = mount.inverted;
    }

    loadedZoneStates = states;
    // Snapshot current poly vertices + exclusion rects as the baseline for badge
    // dirty-detection (poly ids and excl ids are disjoint, so one map holds both).
    deviceBaseline = {};
    for (const [k, v] of Object.entries(polys)) deviceBaseline[k] = v.map((pt) => ({ x: pt.x, y: pt.y }));
    for (const [k, r] of Object.entries(rects)) deviceBaseline[k] = { ...r };
    // Keep the read-back layout (wire frame, sensor-at-origin) as the provision
    // baseline for A3's safe read-modify-write. LOADED zones only — EMPTY/UNKNOWN/
    // INVALID stay null so the plan never treats them as real state to protect.
    // DEEP COPY, not a ref: setOrClear aliased polys[id] to layout.<zone>.vertices,
    // so an in-place vertex drag/delete would otherwise mutate this baseline in
    // lockstep — the write diff then sees no change ("nothing to write") and the
    // edit silently never provisions. Snapshot it independent of the live polys.
    deviceBaselineLayout = JSON.parse(JSON.stringify(layout));

    const note = warnings.length ? ' · ' + warnings.join('; ') : '';
    setMq('read complete' + note, warnings.length ? '' : 'ok');
    draw();

    // Live view follows a read (which Connect also triggers) — the user gets the
    // moving-target overlay without a separate toggle. setLive re-arms idempotently.
    setLive(true);

    // C1: if this read was triggered by a provision, diff re-read against the write.
    if (pendingConfirm) {
      const { plan: pc, writtenLayout } = pendingConfirm;
      pendingConfirm = null;
      const { confirmed, unconfirmed } = confirmPlan(pc, writtenLayout, layout);
      const lines = confirmed.map((k) => `✓ confirmed: ${k}`);
      for (const k of unconfirmed) lines.push(`⚠ WRITE NOT CONFIRMED: ${k}`);
      setWrite(lines.join('\n'), unconfirmed.length > 0 ? 'err' : 'ok');
    }

    // D3: if this read was triggered by a delete, confirm the zone actually
    // reads back EMPTY — loud if it doesn't (mirrors C1: report the device's
    // own truth, never assume the write landed just because it was sent).
    if (pendingDelete) {
      const { zoneId } = pendingDelete;
      pendingDelete = null;
      const label = zoneById[zoneId].label;
      const s = stateForZoneId(zoneId);
      if (s === ZONE_STATE.EMPTY) {
        setWrite(`✓ deleted: ${label}`, 'ok');
      } else {
        setWrite(`⚠ NOT deleted: ${label} (device still reports ${s})`, 'err');
      }
    }
  }, 3000);
};

const mqLive = document.getElementById('mqLive');
function updateLiveBtn() {
  mqLive.textContent = liveOn ? 'Live view: ON' : 'Live view: OFF';
  mqLive.style.color = liveOn ? '#22d3ee' : '';
}
function setLive(on) {
  if (!z2mClient || !liveDevice) { setMq('not connected — hit Connect first', 'err'); return; }
  z2mClient.publish(`zigbee2mqtt/${liveDevice}/set`, JSON.stringify({ live_view: on ? 'ON' : 'OFF' }));
  liveOn = on; updateLiveBtn();
  if (liveKeepAlive) { clearInterval(liveKeepAlive); liveKeepAlive = null; }
  if (livePoll) { clearInterval(livePoll); livePoll = null; }
  if (liveAutoOff) { clearTimeout(liveAutoOff); liveAutoOff = null; }
  if (on) {
    // Safety stop — quiet the bus if Live view is left running unattended.
    liveAutoOff = setTimeout(() => {
      setLive(false);
      setMq('live view auto-off (30 min) — bus cleared', '');
    }, LIVE_AUTOOFF_MS);
    // Re-arm under the device's 15-min auto-off (sliding window).
    liveKeepAlive = setInterval(() => z2mClient && z2mClient.publish(
      `zigbee2mqtt/${liveDevice}/set`, JSON.stringify({ live_view: 'ON' })), 12 * 60 * 1000);
    // Poll target positions through the converter's `targets` read key. It maps to
    // ep1.read(0xFDCD, [0x0013]) — the same numeric custom-cluster read the converter
    // uses for every other attribute, so it frames correctly and the device answers;
    // fromZigbee decodes the octet and publishes `targets` on the device state topic
    // (handled above). The generic `{read:{cluster,attributes}}` command frames the
    // custom cluster manufacturer-specific and the device rejects it UNSUPPORTED_CLUSTER.
    livePoll = setInterval(() => {
      if (!z2mClient) return;
      z2mClient.publish(`zigbee2mqtt/${liveDevice}/get`, JSON.stringify({ targets: '' }));
    }, 300);
  } else {
    liveTargets = []; draw();
  }
}
mqLive.onclick = () => setLive(!liveOn);

/* ==== Pan Align — increment 1: motor jog + position readout =====================
 * ZC → ESP32 (over the converter, MQTT):
 *   zigbee2mqtt/<dev>/set  {"pan_jog": <signed int half-steps>}   + = CW, − = CCW (map view, from above)
 *   zigbee2mqtt/<dev>/set  {"pan_stop": true}
 * ESP32 → ZC (device state topic / /get):
 *   pan_position — signed half-steps from home ·  pan_limit — max ± travel (soft limit)
 *   ~0.088°/half-step (28BYJ-48 half-step, ~4096/rev).
 * Firmware side NOT yet implemented — jogs publish but the device won't move yet.
 * Backlash (pan-align-design §4): moves are monotonic; the firmware never auto-reverses
 * within a jog, and this UI clamps a jog to remaining travel so a tap can't overshoot. */
const PAN_DEG_PER_STEP = 360 / 4096;
// Defaults until the device reports: assume home@0; ±90° travel ≈ ±1024 half-steps
// (pan-align-design §Open-decisions, resolved 2026-07-18). Device pan_limit overrides.
let panPosition = 0, panLimit = 1024;
function panUpdateReadout() {
  const el = document.getElementById('panStatus');
  if (!el) return;
  if (panPosition == null) { el.textContent = 'pan: — steps (—°)'; return; }
  const deg = (panPosition * PAN_DEG_PER_STEP).toFixed(1);
  el.textContent = `pan: ${panPosition} steps (${deg}°)` + (panLimit != null ? `  · limit ±${panLimit}` : '');
}
function panJog(steps) {
  if (!z2mClient || !liveDevice) { setMq('not connected — hit Connect first', 'err'); return; }
  if (panLimit != null && panPosition != null) {   // clamp to remaining travel (never overshoot the soft limit)
    const cap = steps > 0 ? (panLimit - panPosition) : (-panLimit - panPosition);
    if (Math.sign(cap) !== Math.sign(steps) || Math.abs(cap) < Math.abs(steps)) steps = cap;
    if (!steps) { setMq('pan: at soft limit', ''); return; }
  }
  z2mClient.publish(`zigbee2mqtt/${liveDevice}/set`, JSON.stringify({ pan_jog: steps }));
}
function panStop() {
  if (z2mClient && liveDevice) z2mClient.publish(`zigbee2mqtt/${liveDevice}/set`, JSON.stringify({ pan_stop: true }));
}
{
  const coarse = () => parseInt(document.getElementById('panCoarse').value, 10) || 64;
  const fine   = () => parseInt(document.getElementById('panFine').value, 10) || 8;
  document.getElementById('panCCWc').onclick = () => panJog(-coarse());
  document.getElementById('panCCWf').onclick = () => panJog(-fine());
  document.getElementById('panCWf').onclick  = () => panJog(+fine());
  document.getElementById('panCWc').onclick  = () => panJog(+coarse());
  document.getElementById('panStop').onclick = panStop;
}

// boot
cv.style.cursor = mode === 'pan' ? 'grab' : 'crosshair';   // match the default mode
syncZoneButtons();
resize();
fitView();
</script>
